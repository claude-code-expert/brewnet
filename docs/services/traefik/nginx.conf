server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── 서버 정보 숨기기 (whoami의 정반대) ──
    server_tokens off;

    # ── 보안 헤더 ──
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "DENY"          always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "no-referrer"    always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com" always;

    # ── 모든 경로 → 랜딩 페이지 ──
    location / {
        try_files $uri /index.html;
    }

    # ── Traefik 헬스체크 ──
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"brewnet-landing"}';
    }

    # ── 숨김 파일 차단 ──
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── 불필요한 메서드 차단 ──
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }
}
